
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Luna's Links</title>
            <style>
                body {
                    font-family: 'Inter', sans-serif;
                    background-color: #fafafa;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    padding: 50px 20px;
                    margin: 0;
                    color: #333;
                }
                .profile-pic {
                    width: 120px;
                    height: 120px;
                    border-radius: 50%;
                    background-color: #ddd;
                    margin-bottom: 20px;
                    border: 3px solid #333;
                    display: flex;
                    align-items: center;

                }
                .name {
                    font-size: 24px;
                    font-weight: bold;
                    margin-bottom: 30px;
                    color: #333;
                }
                .links-container {
                    display: flex;
                    flex-direction: column;
                    width: 100%;
                    max-width: 400px;
                    gap: 15px;
                }
                .link-btn {
                    background-color: #333;
                    color: #fff;
                    padding: 15px 20px;
                    border-radius: 30px;
                    text-decoration: none;
                    text-align: center;
                    font-weight: 600;
                    font-size: 16px;
                    transition: transform 0.2s, opacity 0.2s;
                    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                }
                .link-btn:hover {
                    transform: translateY(-2px);
                    opacity: 0.9;
                }
            </style>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
